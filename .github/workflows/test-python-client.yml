name: Test Python Client

on:
  push:
    paths:
      - "python_client/**"
      - "packages/ws-client/test/MockMatterServer.ts"
      - "packages/matter-server/test/**"
  pull_request:
    paths:
      - "python_client/**"
      - "packages/ws-client/test/MockMatterServer.ts"
      - "packages/matter-server/test/**"

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  lint:
    name: Python client linting and type checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Python client with test dependencies
        run: npm run python:install

      - name: Run ruff linter
        run: npm run python:lint

      - name: Run mypy type checker
        run: npm run python:typecheck

  unit-tests:
    name: Python client unit tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build JS packages
        run: npm run build

      - name: Install Python client with test dependencies
        run: npm run python:install

      - name: Run unit and mock server tests
        run: npm run python:test

  integration-tests:
    name: Python client integration tests
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build JS packages
        run: npm run build

      - name: Install Python client with test dependencies
        run: npm run python:install

      - name: Run integration tests
        run: npm run python:test-integration
