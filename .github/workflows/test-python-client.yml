name: Test Python Client

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  merge_group:

# Cancel previous PR/branch runs when a new commit is pushed
concurrency:
  group: ${{ github.ref }}-python-client
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  check-changes:
    name: Check for relevant changes
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.changes.outputs.python-client }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            python-client:
              - "python_client/**"
              - "packages/ws-client/test/MockMatterServer.ts"
              - "packages/matter-server/test/**"
              - "packages/**/package.json"
              - ".github/workflows/test-python-client.yml"

  lint:
    name: Python client linting and type checks
    needs: check-changes
    if: needs.check-changes.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Python client with test dependencies
        run: npm run python:install

      - name: Run ruff linter
        run: npm run python:lint

      - name: Run mypy type checker
        run: npm run python:typecheck

  unit-tests:
    name: Python client unit tests
    needs: [ check-changes, lint ]
    if: needs.check-changes.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build JS packages
        run: npm run build

      - name: Install Python client with test dependencies
        run: npm run python:install

      - name: Run unit and mock server tests
        run: npm run python:test

  integration-tests:
    name: Python client integration tests
    needs: [ check-changes, lint ]
    if: needs.check-changes.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build JS packages
        run: npm run build

      - name: Install Python client with test dependencies
        run: npm run python:install

      - name: Run integration tests
        run: npm run python:test-integration
