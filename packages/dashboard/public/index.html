<!doctype html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#03a9f4" />
  <title>Open Home Foundation Matter Server</title>
  <script type="module" src="js/main.js"></script>
  <style>
  html {
    background-color: #f5f5f5;
  }

  html.dark-theme {
    background-color: #121212;
  }

  body {
    --roboto-font: Roboto, system-ui;
    --text-color: rgba(0, 0, 0, 0.6);
    --danger-color: #db4437;
    --success-color: #2e7d32;

    --md-sys-color-primary: #03a9f4;
    --md-sys-color-on-primary: #fff;
    --md-dialog-container-shape: 8px;
    --md-ref-typeface-brand: var(--roboto-font);
    --md-ref-typeface-plain: var(--roboto-font);

    --md-sys-color-background: #f5f5f5;
    --md-sys-color-on-background: #1c1b1f;
    --md-sys-color-surface: #fff;
    --md-sys-color-on-surface: #1c1b1f;
    --md-sys-color-on-surface-variant: #49454f;
    --md-sys-color-surface-variant: #e7e0ec;
    --md-sys-color-surface-container: #fff;
    --md-sys-color-surface-container-low: #f7f2fa;
    --md-sys-color-surface-container-high: #fff;
    --md-sys-color-surface-container-highest: #f5f5f5;
    --md-sys-color-secondary-container: #e0e0e0;
    --md-sys-color-error: #b3261e;
    --md-sys-color-on-error: #fff;
    --md-sys-color-error-container: #f9dedc;
    --md-sys-color-on-error-container: #410e0b;
    --md-sys-color-tertiary: #7d5260;
    --md-sys-color-on-tertiary: #fff;
    --md-sys-color-primary-container: #d0e4ff;
    --md-sys-color-on-primary-container: #001d36;
    --md-sys-color-outline: #79747e;
    --md-sys-color-outline-variant: #cac4d0;

    /* Developer-mode accent (deep violet — distinct from primary-cyan and error-red) */
    --dev-color: #5e35b1;
    --dev-on-color: #ffffff;

    /* Graph / network semantic colors */
    --signal-color-strong: #4caf50;
    --signal-color-medium: #ff9800;
    --signal-color-weak: #f44336;
    --signal-color-none: #9e9e9e;
    --node-color-selected: #1976d2;
    --node-color-offline: #d32f2f;
    --node-color-selected-offline: #b71c1c;
    --node-color-unknown: #ff9800;
    --node-color-default: #666666;
    --graph-font-color: #333333;
    --graph-edge-dimmed: #cccccc;
    --graph-node-fallback: #999999;
    --monospace-font: "Roboto Mono", ui-monospace, monospace;

    --md-sys-typescale-headline-font: var(--roboto-font);
    --md-sys-typescale-title-font: var(--roboto-font);

    margin: 0;
    padding: 0;
    font-family: var(--roboto-font);
    background-color: var(--md-sys-color-background);
  }

  body {
    --primary-color: var(--md-sys-color-primary);
  }

  a {
    color: var(--primary-color);
  }

  /* Dark theme overrides */
  html.dark-theme body {
    --md-sys-color-primary: #4fc3f7;
    --md-sys-color-on-primary: #003544;
    --md-sys-color-background: #121212;
    --md-sys-color-on-background: #e6e1e5;
    --md-sys-color-surface: #1e1e1e;
    --md-sys-color-on-surface: #e6e1e5;
    --md-sys-color-on-surface-variant: #cac4d0;
    --md-sys-color-surface-variant: #49454f;
    --md-sys-color-surface-container: #1e1e1e;
    --md-sys-color-surface-container-low: #1a1a1a;
    --md-sys-color-surface-container-high: #2b2b2b;
    --md-sys-color-surface-container-highest: #363636;
    --md-sys-color-secondary-container: #4a4458;
    --md-sys-color-on-secondary-container: #e8def8;
    --md-sys-color-error: #f2b8b5;
    --md-sys-color-on-error: #601410;
    --md-sys-color-error-container: #8c1d18;
    --md-sys-color-on-error-container: #f9dedc;
    --md-sys-color-tertiary: #efb8c8;
    --md-sys-color-on-tertiary: #492532;
    --md-sys-color-primary-container: #004a77;
    --md-sys-color-on-primary-container: #d0e4ff;
    --md-sys-color-outline: #938f99;
    --md-sys-color-outline-variant: #49454f;
    --dev-color: #b39ddb;
    --dev-on-color: #311b92;
    --signal-color-strong: #66bb6a;
    --signal-color-medium: #ffa726;
    --signal-color-weak: #ef5350;
    --signal-color-none: #757575;
    --node-color-selected: #42a5f5;
    --node-color-offline: #ef5350;
    --node-color-selected-offline: #e53935;
    --node-color-unknown: #ffa726;
    --node-color-default: #b0b0b0;
    --graph-font-color: #e0e0e0;
    --graph-edge-dimmed: #555555;
    --graph-node-fallback: #999999;
    --text-color: rgba(255, 255, 255, 0.6);
    --danger-color: #ff7961;
    --success-color: #66bb6a;
    --primary-color: #4fc3f7;
    color-scheme: dark;
  }

  /* Respect user preference for reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
      scroll-behavior: auto !important;
    }
  }
  </style>
</head>
<body></body>
</html>
